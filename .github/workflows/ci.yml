name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Analyze titan
        working-directory: packages/titan
        run: dart analyze --fatal-infos

      - name: Analyze titan_bastion
        working-directory: packages/titan_bastion
        run: dart analyze --fatal-infos

      - name: Analyze titan_atlas
        working-directory: packages/titan_atlas
        run: dart analyze --fatal-infos

      - name: Test titan
        working-directory: packages/titan
        run: flutter test

      - name: Test titan_bastion
        working-directory: packages/titan_bastion
        run: flutter test

      - name: Test titan_atlas
        working-directory: packages/titan_atlas
        run: flutter test

      - name: Check formatting
        run: dart format --set-exit-if-changed packages/titan/lib packages/titan_bastion/lib packages/titan_atlas/lib

  benchmark:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Restore Previous Benchmark Baseline
        uses: actions/cache/restore@v4
        with:
          path: packages/titan/benchmark/results
          key: benchmark-baseline-${{ github.ref_name }}
          restore-keys: |
            benchmark-baseline-main
            benchmark-baseline-

      - name: Run Benchmark Tracker
        working-directory: packages/titan
        run: dart run benchmark/benchmark_track.dart | tee benchmark_output.txt

      - name: Run CI Benchmarks (JSON)
        working-directory: packages/titan
        run: dart run benchmark/benchmark_ci.dart > benchmark_results.json

      - name: Save Benchmark Baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: packages/titan/benchmark/results
          key: benchmark-baseline-main-${{ github.sha }}

      - name: Generate Benchmark Summary
        working-directory: packages/titan
        run: |
          echo "## ⚡ Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat benchmark_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            packages/titan/benchmark_output.txt
            packages/titan/benchmark_results.json
            packages/titan/benchmark/results/latest.json
          retention-days: 90
          overwrite: true

      - name: Generate Benchmark Report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: packages/titan
        run: |
          dart run benchmark/benchmark_ci_report.dart \
            --json benchmark_results.json \
            --output ../../docs/BENCHMARKS.md \
            --commit ${{ github.sha }} \
            --max-runs 50

      - name: Commit Benchmark Report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/BENCHMARKS.md
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit"
          else
            git commit -m "docs: update benchmark history [skip ci]"
            git pull --rebase origin main
            git push
          fi

