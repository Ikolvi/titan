name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Analyze titan
        working-directory: packages/titan
        run: dart analyze --fatal-infos

      - name: Analyze titan_bastion
        working-directory: packages/titan_bastion
        run: dart analyze --fatal-infos

      - name: Analyze titan_atlas
        working-directory: packages/titan_atlas
        run: dart analyze --fatal-infos

      - name: Test titan
        working-directory: packages/titan
        run: flutter test

      - name: Test titan_bastion
        working-directory: packages/titan_bastion
        run: flutter test

      - name: Test titan_atlas
        working-directory: packages/titan_atlas
        run: flutter test

      - name: Check formatting
        run: dart format --set-exit-if-changed packages/titan/lib packages/titan_bastion/lib packages/titan_atlas/lib
