name: titan_colossus
description: "Enterprise performance monitoring for Titan. Frame metrics, page load timing, memory leak detection, rebuild tracking, and Lens integration."
version: 1.0.1
homepage: https://ikolvi.com
repository: https://github.com/Ikolvi/titan
issue_tracker: https://github.com/Ikolvi/titan/issues

topics:
  - performance
  - monitoring
  - flutter
  - devtools
  - profiling

resolution: workspace

environment:
  sdk: ^3.10.3
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  titan: ^1.0.0
  titan_bastion: ^1.0.0
  titan_atlas: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
