name: titan_colossus
description: "Enterprise performance monitoring, AI testing, and MCP integration for Titan. Scry observation, Relay bridge, Blueprint generation, 48 MCP tools, and Lens debug overlay."
version: 2.0.2
homepage: https://ikolvi.com
repository: https://github.com/Ikolvi/titan
issue_tracker: https://github.com/Ikolvi/titan/issues

topics:
  - performance
  - monitoring
  - flutter
  - devtools
  - profiling

resolution: workspace

environment:
  sdk: ^3.10.3
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  titan: ^1.1.3
  titan_bastion: ^1.1.0
  titan_atlas: ^1.1.1
  titan_basalt: ^1.12.6
  titan_argus: ^1.0.4
  titan_envoy: ^1.1.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
